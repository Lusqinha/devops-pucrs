name: Pipeline CI - DevOps Fase 1

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build-and-test:
    name: Build e Testes Automatizados
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Configuração do Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Instalação das dependências
        run: pip install -r requirements.txt

      - name: Execução dos testes automatizados
        run: pytest app/test_app.py -v

      - name: Build da imagem Docker
        run: docker build -t devops-fase1 .

      - name: Verificação do container
        run: |
          docker run -d -p 5000:5000 --name devops-fase1-container devops-fase1
          sleep 3
          curl -f http://localhost:5000/health
          docker stop devops-fase1-container

  deploy:
    name: Deploy na EC2
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Configuração do Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login no Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build e Push da imagem para o Docker Hub
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/devops-fase1:latest

      - name: Deploy via SSH na EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker stop devops-fase1-container || true
            docker rm devops-fase1-container || true
            docker rmi ${{ secrets.DOCKERHUB_USERNAME }}/devops-fase1:latest || true
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/devops-fase1:latest
            docker run -d \
              -p 5000:5000 \
              --name devops-fase1-container \
              --restart unless-stopped \
              ${{ secrets.DOCKERHUB_USERNAME }}/devops-fase1:latest
            sleep 3
            curl -f http://localhost:5000/health
