name: Pipeline CI - DevOps Fase 1

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build-and-test:
    name: Build e Testes Automatizados
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Configuração do Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Instalação das dependências
        run: pip install -r requirements.txt

      - name: Execução dos testes automatizados
        run: pytest app/test_app.py -v

      - name: Build da imagem Docker
        run: docker build -t devops-fase1 .

      - name: Verificação do container
        run: |
          docker run -d -p 5000:5000 --name devops-fase1-container devops-fase1
          sleep 3
          curl -f http://localhost:5000/health
          docker stop devops-fase1-container
